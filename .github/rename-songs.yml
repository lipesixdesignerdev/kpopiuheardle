name: Normalize Song Filenames

on:
  push:
    paths:
      - "songs/**"

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize filenames
        run: |
          for file in songs/*; do
            if [ -f "$file" ]; then
              base=$(basename "$file")
              ext="${base##*.}"
              name="${base%.*}"

              new=$(echo "$name" \
                | tr '[:upper:]' '[:lower:]' \
                | sed 's/[()]/ /g' \
                | sed 's/[^a-z0-9]/-/g' \
                | sed 's/-\+/-/g' \
                | sed 's/^-//;s/-$//')

              newfile="songs/${new}.${ext,,}"

              if [ "$file" != "$newfile" ]; then
                mv "$file" "$newfile"
                echo "$base -> $(basename "$newfile")"
              fi
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add songs/*
          git commit -m "Normalize song filenames" || echo "No changes"
          git push
