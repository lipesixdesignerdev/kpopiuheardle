<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IU Heardle</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar"><img src="iuHeart-2x.gif" alt="IU"></div>
    <div class="logo-text">
      <span class="logo-iu">IU</span><span class="logo-heardle">Heardle</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="lang-switcher" id="langSwitcher"></div>
    <button class="icon-btn" id="statsBtn">📊</button>
    <button class="icon-btn" id="newBtn">🔄</button>
  </div>
</header>

<div class="app">
  <div class="bars" id="barsContainer"></div>

  <div class="player-card">
    <div class="waveform" id="waveform"></div>
    <button class="play-btn" id="playBtn">▶</button>
    <p id="statusText" style="font-size:12px;color:var(--muted);">Pronto! Clique ▶</p>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
    <div id="timerLabel" style="font-size:11px;color:var(--muted);width:100%;text-align:right;">0.0s / 1s</div>
  </div>

  <div class="guesses-list" id="guessesList"></div>

  <div class="input-section">
    <div class="autocomplete" id="autocomplete"></div>
    <input class="song-input" type="text" id="songInput" autocomplete="off">
  </div>

  <div class="btn-row">
    <button class="btn btn-skip" id="skipBtn"></button>
    <button class="btn btn-confirm" id="confirmBtn"></button>
  </div>
</div>

<!-- STATS MODAL -->
<div class="modal-overlay" id="statsModal">
  <div class="modal-content">
    <p class="modal-title" id="statsTitle">📊</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:4px;" id="statsSubtitle"></p>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="dist-section" id="distSection"></div>
    <button id="statsResetBtn" class="btn btn-skip" style="margin-top:16px;"></button>
    <button id="statsCloseBtn" class="btn btn-confirm" style="margin-top:8px;"></button>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-content">
    <h2 id="resultTitle" style="font-family:'Playfair Display';"></h2>
    <div id="albumArtWrapper" style="width:180px;height:180px;margin:20px auto;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--border);display:flex;align-items:center;justify-content:center;">
      <img id="albumArt" src="" class="album-art">
      <div id="albumFallback" style="display:none;align-items:center;justify-content:center;font-size:48px;width:100%;">🎵</div>
    </div>
    <p id="resultSongName" style="font-size:20px;color:var(--accent);font-weight:bold;"></p>
    <p id="resultAlbum" style="color:var(--muted);font-size:14px;margin-bottom:20px;"></p>
    <button id="againBtn" class="btn btn-confirm"></button>
  </div>
</div>

<!-- THEME SWITCHER -->
<div class="theme-switcher">
  <div class="theme-options" id="themeOptions"></div>
  <button class="theme-toggle-btn" id="themeToggleBtn" title="Mudar tema">💜</button>
</div>

<script src="database.js"></script>
<script src="script.js"></script>
</body>
</html>
