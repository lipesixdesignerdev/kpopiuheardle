<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IU Heardle — Adivinhe a Música</title>
  <meta name="description" content="O jogo de adivinhar músicas da IU. Ouça o trecho e descubra o título antes de acabar as tentativas!"/>
  <link rel="icon" href="iuHeart-2x.gif" type="image/gif">

  <!-- Poppins (HooBank-style) + fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar"><img src="iuHeart-2x.gif" alt="IU"></div>
    <div class="logo-text">
      <span class="logo-iu">IU</span><span class="logo-heardle">Heardle</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="lang-switcher" id="langSwitcher"></div>
    <button class="icon-btn" id="statsBtn" title="Estatísticas">📊</button>
    <button class="icon-btn" id="newBtn" title="Nova música">🔄</button>
  </div>
</header>

<div class="app">
  <div class="bars" id="barsContainer"></div>

  <div class="player-card">
    <div class="waveform" id="waveform"></div>
    <button class="play-btn" id="playBtn">▶</button>
    <p id="statusText" style="font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.3px;">Pronto! Clique ▶</p>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
    <div id="timerLabel" style="font-size:11px;color:var(--muted);width:100%;text-align:right;font-weight:500;">0.0s / 1s</div>
  </div>

  <div class="guesses-list" id="guessesList"></div>

  <div class="input-section">
    <div class="autocomplete" id="autocomplete"></div>
    <input class="song-input" type="text" id="songInput" autocomplete="off">
  </div>

  <div class="btn-row">
    <button class="btn btn-skip" id="skipBtn"></button>
    <button class="btn btn-confirm" id="confirmBtn"></button>
  </div>

  <div class="footer-credit" style="text-align: center; font-size: 13px; color: var(--muted); margin-top: 36px; margin-bottom: 12px; font-weight: 500;">
    <span id="creditText"></span> 
    <a href="https://www.twitch.tv/lipesiix" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 600;">LipeSiix</a>
  </div>
</div>

<!-- STATS MODAL -->
<div class="modal-overlay" id="statsModal">
  <div class="modal-content">
    <p class="modal-title" id="statsTitle">📊</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500;" id="statsSubtitle"></p>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="dist-section" id="distSection"></div>
    <button id="statsResetBtn" class="btn btn-skip" style="margin-top:16px;"></button>
    <button id="statsCloseBtn" class="btn btn-confirm" style="margin-top:8px;"></button>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-content">
    <h2 id="resultTitle" style="font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;"></h2>
    <div id="albumArtWrapper" style="width:180px;height:180px;margin:16px auto;border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;">
      <img id="albumArt" src="" class="album-art">
      <div id="albumFallback" style="display:none;align-items:center;justify-content:center;font-size:52px;width:100%;">🎵</div>
    </div>
    <p id="resultSongName" style="font-size:18px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;"></p>
    <p id="resultAlbum" style="color:var(--muted);font-size:13px;margin-bottom:20px;font-weight:500;"></p>
    <button id="againBtn" class="btn btn-confirm"></button>
  </div>
</div>

<!-- THEME SWITCHER -->
<div class="theme-switcher">
  <div class="theme-options" id="themeOptions"></div>
  <button class="theme-toggle-btn" id="themeToggleBtn" title="Mudar tema">🎨</button>
</div>

<script src="dist/guard.js"></script>
<script src="dist/database.js"></script>
<script src="dist/script.js"></script>
</body>
</html>
