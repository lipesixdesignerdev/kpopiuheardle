<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IU Heardle - Digital Games Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0b12;
    --card:    #1a1625;
    --border:  #2e2840;
    --accent:  #e879a0;
    --accent2: #c084fc;
    --correct: #4ade80;
    --wrong:   #f87171;
    --skip:    #facc15;
    --text:    #f5f0ff;
    --muted:   #7a6e90;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 0 0 60px; position: relative; overflow-x: hidden;
  }

  header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 520px; padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px; z-index: 10;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); background: var(--border); }
  .logo-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .logo-iu { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); font-weight: 700; }
  .logo-heardle { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); font-weight: 400; }

  .header-actions { display: flex; align-items: center; gap: 10px; }
  .lang-switcher { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--card); }
  .lang-btn { background: none; border: none; color: var(--muted); padding: 5px 8px; font-size: 11px; cursor: pointer; font-weight: bold; }
  .lang-btn.active { background: var(--accent); color: white; }

  .icon-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; }
  .icon-btn:hover { background: var(--border); }

  .app { width: 100%; max-width: 520px; padding: 0 20px; position: relative; z-index: 1; }
  .bars { display: flex; gap: 6px; margin: 20px 0 10px; }
  .bar { flex: 1; height: 8px; border-radius: 4px; background: var(--border); position: relative; }
  .bar.correct { background: var(--correct); }
  .bar.wrong   { background: var(--wrong); }
  .bar.skipped { background: var(--skip); }

  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px 20px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
  .waveform { display: flex; align-items: center; gap: 3px; height: 40px; }
  .wave-bar { width: 4px; background: var(--border); border-radius: 2px; }
  .waveform.playing .wave-bar { background: var(--accent); animation: wave-anim 0.6s ease-in-out infinite alternate; }
  @keyframes wave-anim { 0% { height: 6px; } 100% { height: 30px; } }

  .play-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,121,160,.5); }

  .timer-track { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.1s linear; }

  .guesses-list { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .guess-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 14px; color: var(--text); }

  .input-section { margin-top: 20px; position: relative; }
  .song-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 12px; outline: none; font-size: 15px; }
  .autocomplete { position: absolute; bottom: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; margin-bottom: 5px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
  .autocomplete.show { display: block; }
  .ac-item { padding: 12px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .ac-item:hover { background: var(--border); color: var(--accent); }

  .btn-row { display: flex; gap: 10px; margin-top: 15px; }
  .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 14px; }
  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
  .album-art { width: 180px; height: 180px; border-radius: 12px; object-fit: cover; margin: 20px 0; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-avatar">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/IU_at_the_2022_Golden_Disc_Awards.jpg/220px-IU_at_the_2022_Golden_Disc_Awards.jpg" alt="IU">
    </div>
    <div class="logo-text">
      <span class="logo-iu">IU</span><span class="logo-heardle"> Heardle</span>
    </div>
  </div>

  <div class="header-actions">
    <div class="lang-switcher">
      <button class="lang-btn active">PT</button>
      <button class="lang-btn">EN</button>
      <button class="lang-btn">ES</button>
    </div>
    <button class="icon-btn" id="statsBtn">📊</button>
    <button class="icon-btn" id="newBtn">🔄</button>
  </div>
</header>

<div class="app">
  <div class="bars" id="barsContainer"></div>

  <div class="player-card">
    <div class="waveform" id="waveform"></div>
    <button class="play-btn" id="playBtn">▶</button>
    <p class="status-text" id="statusText" style="font-size: 12px; color: var(--muted);">Pronto! Clique ▶</p>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
    <div id="timerLabel" style="font-size:11px; color:var(--muted); width: 100%; text-align: right;">0.0s / 1s</div>
  </div>

  <div class="guesses-list" id="guessesList"></div>

  <div class="input-section">
    <div class="autocomplete" id="autocomplete"></div>
    <input class="song-input" type="text" id="songInput" placeholder="seu palpite aqui…" autocomplete="off">
  </div>

  <div class="btn-row">
    <button class="btn" id="skipBtn" style="background:var(--card); color:var(--muted); border:1px solid var(--border);">⏭ Pular (+1s)</button>
    <button class="btn btn-confirm" id="confirmBtn">✓ Confirmar</button>
  </div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal-content">
    <h2 id="resultTitle" style="font-family:'Playfair Display';"></h2>
    <img 
  class="album-art" 
  id="albumArt" 
  src="" 
  referrerpolicy="no-referrer"
  onerror="this.src='https://via.placeholder.com/180x180/1a1625/e879a0?text=IU'"
>
<script src="database.js"></script>
<script>
  const DURATIONS = [1, 2, 4, 7, 11, 16];
  let currentSong = null, attempt = 0, guesses = [], isPlaying = false, audio = null, timerInterval = null;
  let gameOver = false; // ✅ CORRIGIDO: variável declarada

  // ── Traduções ──────────────────────────────────────────────────────────────
  const i18n = {
    PT: {
      status:      "Pronto! Clique ▶",
      placeholder: "seu palpite aqui…",
      skip:        "⏭ Pular (+1s)",
      confirm:     "✓ Confirmar",
      wonTitle:    "🎉 Você acertou!",
      lostTitle:   "😔 Não foi dessa vez!",
      playAgain:   "🔄 Jogar Novamente",
      stats:       "Estatísticas em breve!"
    },
    EN: {
      status:      "Ready! Click ▶",
      placeholder: "your guess here…",
      skip:        "⏭ Skip (+1s)",
      confirm:     "✓ Confirm",
      wonTitle:    "🎉 You got it!",
      lostTitle:   "😔 Not this time!",
      playAgain:   "🔄 Play Again",
      stats:       "Stats coming soon!"
    },
    ES: {
      status:      "¡Listo! Clic ▶",
      placeholder: "tu respuesta aquí…",
      skip:        "⏭ Saltar (+1s)",
      confirm:     "✓ Confirmar",
      wonTitle:    "🎉 ¡Lo lograste!",
      lostTitle:   "😔 ¡Otra vez será!",
      playAgain:   "🔄 Jugar de Nuevo",
      stats:       "¡Estadísticas próximamente!"
    }
  };

  let currentLang = 'PT';

  function setLanguage(lang) {
    currentLang = lang;
    const t = i18n[lang];
    document.getElementById("statusText").textContent    = t.status;
    document.getElementById("songInput").placeholder     = t.placeholder;
    document.getElementById("skipBtn").textContent       = t.skip;
    document.getElementById("confirmBtn").textContent    = t.confirm;
    document.getElementById("againBtn").textContent      = t.playAgain;
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.textContent === lang);
    });
  }

  // ✅ CORRIGIDO: event listeners nos botões de idioma
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => setLanguage(btn.textContent));
  });
  // ───────────────────────────────────────────────────────────────────────────

  function init() {
    if (typeof musicasIU === 'undefined') {
      alert("Erro: database.js não encontrado!");
      return;
    }
    gameOver = false;
    attempt  = 0;
    guesses  = [];
    currentSong = musicasIU[Math.floor(Math.random() * musicasIU.length)];
    audio = new Audio(currentSong.file);
    renderBars();
    buildWaveform();
    document.getElementById("songInput").value = "";
    document.getElementById("guessesList").innerHTML = "";
    document.getElementById("timerFill").style.width = "0%";
    document.getElementById("timerLabel").textContent = "0.0s / 1s";
    setLanguage(currentLang);
  }

  function handlePlay() {
    if (isPlaying) { pauseAudio(); return; }
    const maxDur = DURATIONS[attempt];
    audio.currentTime = 0;
    audio.play();
    isPlaying = true;
    document.getElementById("playBtn").textContent = "⏸";
    document.getElementById("waveform").classList.add("playing");

    let elapsed = 0;
    timerInterval = setInterval(() => {
      elapsed += 0.1;
      document.getElementById("timerFill").style.width = Math.min((elapsed / maxDur) * 100, 100) + "%";
      document.getElementById("timerLabel").textContent = elapsed.toFixed(1) + "s / " + maxDur + "s";
      if (elapsed >= maxDur) pauseAudio();
    }, 100);
  }

  function pauseAudio() {
    audio.pause();
    clearInterval(timerInterval);
    isPlaying = false;
    document.getElementById("playBtn").textContent = "▶";
    document.getElementById("waveform").classList.remove("playing");
  }

  function selectSong(title) {
    document.getElementById("songInput").value = title;
    document.getElementById("autocomplete").classList.remove("show");
  }

  document.getElementById("songInput").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    const ac = document.getElementById("autocomplete");
    if (!q) { ac.classList.remove("show"); return; }
    const matches = musicasIU.filter(s => s.title.toLowerCase().includes(q)).slice(0, 5);
    ac.innerHTML = matches.map(m => `<div class="ac-item" onclick="selectSong('${m.title}')">${m.title}</div>`).join('');
    ac.classList.add("show");
  });

  function submitGuess() {
    const val = document.getElementById("songInput").value.trim();
    if (!val || gameOver) return;
    const correct = val.toLowerCase() === currentSong.title.toLowerCase();
    guesses.push({ title: val, correct });
    if (correct) {
      renderBars();
      renderGuesses();
      showResult(true);
    } else {
      attempt++;
      if (attempt >= 6) {
        renderBars();
        renderGuesses();
        showResult(false);
      } else {
        renderBars();
        renderGuesses();
        document.getElementById("songInput").value = "";
      }
    }
  }

  function skip() {
    if (gameOver) return;
    guesses.push({ title: i18n[currentLang].skip.replace("⏭ ", "").replace(" (+1s)",""), correct: false, skipped: true });
    attempt++;
    if (attempt >= 6) {
      renderBars();
      renderGuesses();
      showResult(false);
    } else {
      renderBars();
      renderGuesses();
    }
  }

  function renderBars() {
    const container = document.getElementById("barsContainer");
    container.innerHTML = Array.from({ length: 6 }, (_, i) => {
      let cls = "bar";
      if (i < guesses.length) cls += guesses[i].correct ? " correct" : (guesses[i].skipped ? " skipped" : " wrong");
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function renderGuesses() {
    document.getElementById("guessesList").innerHTML = guesses.map(g =>
      `<div class="guess-item">${g.title}</div>`
    ).join('');
  }

  function showResult(won) {
    gameOver = true;
    pauseAudio();
    const t = i18n[currentLang];
    document.getElementById("resultModal").classList.add("show");
    document.getElementById("resultTitle").textContent    = won ? t.wonTitle : t.lostTitle;
    document.getElementById("resultSongName").textContent = currentSong.title;
    document.getElementById("resultAlbum").textContent    = currentSong.album;
    document.getElementById("albumArt").src               = currentSong.cover;
    document.getElementById("againBtn").textContent       = t.playAgain;
  }

  function buildWaveform() {
    const wf = document.getElementById("waveform");
    wf.innerHTML = "";
    for (let i = 0; i < 25; i++) {
      wf.innerHTML += `<div class="wave-bar" style="height:10px; --peak:${15 + Math.random() * 20}px"></div>`;
    }
  }

  document.getElementById("playBtn").addEventListener("click", handlePlay);
  document.getElementById("confirmBtn").addEventListener("click", submitGuess);
  document.getElementById("skipBtn").addEventListener("click", skip);
  document.getElementById("againBtn").addEventListener("click", () => {
    document.getElementById("resultModal").classList.remove("show");
    init();
  });
  document.getElementById("newBtn").addEventListener("click", () => {
    document.getElementById("resultModal").classList.remove("show");
    init();
  });
  document.getElementById("statsBtn").addEventListener("click", () => alert(i18n[currentLang].stats));

  window.onload = init;
</script>
</body>
</html>
